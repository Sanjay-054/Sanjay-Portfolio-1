<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skills</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/png" href="fevicon image.png">

</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <header>
    <h1>SKILLS</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="certifications.html">Certifications</a>
      <a href="skills.html" class="active">Skills</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">projects</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button id="themeToggle">🌙</button>

  </header>

  <main class="fade-in">
  <h2>My Skills</h2>
  <div class="skills-grid">
    <div class="skill-item">
      <img src="python.png" alt="Python" />
      <p>Python</p>
    </div>
    <div class="skill-item">
      <img src="java.png" alt="Java" />
      <p>Java</p>
    </div>
    <div class="skill-item">
      <img src="html.png" alt="HTML" />
      <p>HTML</p>
    </div>
    <div class="skill-item">
      <img src="css.png" alt="CSS" />
      <p>CSS</p>
    </div>
    <div class="skill-item">
      <img src="JS.png" alt="JavaScript" />
      <p>JavaScript</p>
    </div>
    <div class="skill-item">
      <img src="reactjs.png" alt="ReactJS" />
      <p>ReactJS</p>
    </div>
    <div class="skill-item">
      <img src="SQL.jpeg" alt="MySQL" />
      <p>MySQL</p>
    </div>
    
    <div class="skill-item">
      <img src="selenium.png" alt="Selenium" />
      <p>Selenium</p>

    <div class="skill-item">
      <img src="black box.png" alt="Black Box Testing" />
      <p>Black Box Testing</p>
    </div>
    <div class="skill-item">
      <img src="white box.jpeg" alt="White Box Testing" />
      <p>White Box Testing</p>
    </div>
    <div class="skill-item">
      <img src="functionali testing.png" alt="Functional Testing" />
      <p>Functional Testing</p>
    </div>
  </div>
</main>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const navLinks = document.querySelectorAll("nav a");
    const currentPage = window.location.pathname.split("/").pop();

    navLinks.forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  });
  
  const toggleBtn = document.getElementById('themeToggle');
  const body = document.body;

  // Load saved theme
  if (localStorage.getItem('theme') === 'dark') {
    body.classList.add('dark');
    toggleBtn.textContent = '☀️';
  }

  // Toggle theme on button click
  toggleBtn.addEventListener('click', () => {
    body.classList.toggle('dark');
    const isDark = body.classList.contains('dark');

    toggleBtn.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });


(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], orbs = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function isDark() { return document.body.classList.contains('dark'); }

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.r = Math.random() * 1.8 + 0.4;
      this.sx = (Math.random() - 0.5) * 0.4;
      this.sy = (Math.random() - 0.5) * 0.4;
      this.a = Math.random() * 0.5 + 0.1;
    }
    update() {
      this.x += this.sx; this.y += this.sy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = isDark()
        ? `rgba(102,170,255,${this.a})`
        : `rgba(0,123,255,${this.a * 0.7})`;
      ctx.fill();
    }
  }

  class Orb {
    constructor(i) {
      this.x = Math.random() * W; this.y = Math.random() * H;
      this.r = 130 + Math.random() * 100;
      this.sx = (Math.random() - 0.5) * 0.15;
      this.sy = (Math.random() - 0.5) * 0.15;
      this.hue = [210, 240, 200, 190, 225][i];
    }
    update() {
      this.x += this.sx; this.y += this.sy;
      if (this.x < -this.r) this.x = W + this.r;
      if (this.x > W + this.r) this.x = -this.r;
      if (this.y < -this.r) this.y = H + this.r;
      if (this.y > H + this.r) this.y = -this.r;
    }
    draw() {
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
      const a = isDark() ? 0.07 : 0.11;
      g.addColorStop(0, `hsla(${this.hue},85%,60%,${a})`);
      g.addColorStop(1, `hsla(${this.hue},85%,60%,0)`);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) particles.push(new Particle());
  for (let i = 0; i < 5; i++) orbs.push(new Orb(i));

  function loop() {
    ctx.clearRect(0, 0, W, H);
    orbs.forEach(o => { o.update(); o.draw(); });
    particles.forEach(p => { p.update(); p.draw(); });
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = isDark()
            ? `rgba(102,170,255,${(1-d/100)*0.15})`
            : `rgba(0,100,255,${(1-d/100)*0.12})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

</script>
